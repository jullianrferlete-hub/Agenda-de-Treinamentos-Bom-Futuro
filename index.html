<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de treinamentos Bom Futuro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F5;--surface:#fff;--border:#E2E0D9;--border2:#C8C5BC;
  --text:#1A1A18;--muted:#6B6B67;--hint:#A0A09C;
  --blue:#1549A0;--blue-bg:#E8F0FB;--blue-light:#B5D4F4;
  --amber:#7A4A08;--amber-bg:#FEF3DC;--amber-border:#D4900A;
  --green-bg:#E8F5EC;--green:#1A6632;--green-border:#4AA86A;
  --red-bg:#FDE8E8;--red:#A01515;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center}
.login-box h1{font-size:22px;font-weight:600;margin-bottom:6px}
.login-box p{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg);color:var(--text)}
.login-box input:focus{border-color:var(--blue)}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;width:100%}
.btn-blue:hover{background:#0F3580}
.err{color:var(--red);font-size:13px;margin-top:6px;display:none}
.pub-link{margin-top:1rem;font-size:13px;color:var(--muted)}

/* app */
#adminApp,#pubApp{display:none}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:16px;font-weight:600}
.logo span{color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-outline{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--muted);font-weight:500}
.btn-outline:hover{border-color:var(--border2);color:var(--text)}
.btn-outline.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-light)}
.btn-danger:hover{border-color:var(--red);color:var(--red)}

.main{max-width:920px;margin:0 auto;padding:1.5rem}

/* toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:10px;flex-wrap:wrap}
.year-nav{display:flex;align-items:center;gap:6px}
.yn-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:18px;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1}
.yn-btn:hover{background:var(--bg)}
.yn-label{font-size:17px;font-weight:600;min-width:50px;text-align:center}
.filters{display:flex;gap:4px}
.fbtn{padding:5px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;color:var(--muted);font-weight:500}
.fbtn:hover{background:var(--bg)}
.fbtn.fa{background:#1A1A18;color:#fff;border-color:#1A1A18}
.fbtn.fe{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-light)}
.fbtn.ft{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.add-btn:hover{background:#0F3580}

/* tabs */
.tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content;margin-bottom:1.25rem}
.tab{padding:7px 18px;font-size:13px;border:none;background:var(--surface);cursor:pointer;color:var(--muted);font-weight:500;border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{background:var(--blue);color:#fff}

/* legend */
.legend{display:flex;gap:14px;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.ldot{width:9px;height:9px;border-radius:50%}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.cal-grid{grid-template-columns:repeat(2,1fr)}}
.mcal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px}
.mtitle{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.dh{font-size:9px;color:var(--hint);text-align:center;padding:1px 0}
.dc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);border-radius:3px;position:relative;cursor:pointer}
.dc:hover{background:var(--bg)}
.dc.today{background:var(--blue);color:#fff;font-weight:600}
.dc.today:hover{background:#0F3580}
.dc::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;display:none}
.dc.hase::after{display:block;background:var(--blue)}
.dc.hast::after{display:block;background:var(--amber-border)}
.dc.hasboth::after{display:block;background:#7B4FC5}
.mbadges{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.mbadge{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500}
.mbe{background:var(--blue-bg);color:var(--blue)}
.mbt{background:var(--amber-bg);color:var(--amber)}

/* list */
.lsec{margin-bottom:1.25rem}
.lmhdr{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.erow{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:7px}
.erow:hover{border-color:var(--border2)}
.ebar{width:3px;border-radius:4px;align-self:stretch;flex-shrink:0}
.bar-e{background:var(--blue)}
.bar-t{background:var(--amber-border)}
.ebody{flex:1;min-width:0}
.etag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;margin-bottom:3px}
.etag-e{background:var(--blue-bg);color:var(--blue)}
.etag-t{background:var(--amber-bg);color:var(--amber)}
.ename{font-size:14px;font-weight:600;color:var(--text)}
.emeta{font-size:12px;color:var(--muted);margin-top:2px}
.edesc{font-size:12px;color:var(--hint);margin-top:3px;font-style:italic}
.eactions{display:flex;gap:3px;flex-shrink:0}
.ibtn{width:30px;height:30px;border:none;background:none;cursor:pointer;color:var(--hint);border-radius:7px;font-size:16px;display:flex;align-items:center;justify-content:center}
.ibtn:hover{background:var(--bg);color:var(--text)}
.ibtn.del:hover{background:var(--red-bg);color:var(--red)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.snum{font-size:26px;font-weight:600}
.slbl{font-size:12px;color:var(--muted);margin-top:2px}

/* pub banner */
.pub-banner{background:var(--green-bg);border:1px solid var(--green-border);border-radius:9px;padding:9px 14px;font-size:13px;color:var(--green);margin-bottom:1.25rem}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:440px;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1.1rem}
.field{margin-bottom:11px}
.field label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{height:68px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.topt{padding:9px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);text-align:center}
.topt:hover{border-color:var(--border2)}
.topt.sel-e{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-light)}
.topt.sel-t{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.mfoot{display:flex;gap:8px;margin-top:1.1rem}
.mfoot button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-save{background:var(--blue);color:#fff;border:none}
.btn-save:hover{background:#0F3580}
.btn-cancel{background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}

/* toast */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1A1A18;color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:500;transition:transform .2s;z-index:200;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:12px">📅</div>
    <h1>Agenda</h1>
    <p>Entre como administrador para gerenciar a agenda.</p>
    <input type="password" id="pwdInput" placeholder="Senha do administrador" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-blue" onclick="doLogin()">Entrar como admin</button>
    <p class="err" id="loginErr">Senha incorreta.</p>
    <p class="pub-link">Só quer visualizar? <a href="#" onclick="showPub();return false">Ver agenda pública</a></p>
  </div>
</div>

<div id="adminApp">
  <div class="topbar">
    <span class="logo">Agenda <span>Admin</span></span>
    <div class="topbar-right">
      <button class="btn-outline active" id="navCal" onclick="switchView('cal')">Calendário</button>
      <button class="btn-outline" id="navList" onclick="switchView('list')">Lista</button>
      <button class="btn-outline btn-danger" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="year-nav">
          <button class="yn-btn" onclick="changeYear(-1)">&#8249;</button>
          <span class="yn-label" id="adminYear">2026</span>
          <button class="yn-btn" onclick="changeYear(1)">&#8250;</button>
        </div>
        <div class="filters">
          <button class="fbtn fa" id="fb-all" onclick="setFilter('all')">Todos</button>
          <button class="fbtn" id="fb-e" onclick="setFilter('e')">Eventos</button>
          <button class="fbtn" id="fb-t" onclick="setFilter('t')">Treinamentos</button>
        </div>
      </div>
      <button class="add-btn" onclick="openModal()">&#43; Adicionar</button>
    </div>
    <div class="legend">
      <div class="leg"><div class="ldot" style="background:#1549A0"></div>Evento</div>
      <div class="leg"><div class="ldot" style="background:#D4900A"></div>Treinamento</div>
    </div>
    <div id="adminCal"></div>
    <div id="adminList" style="display:none"></div>
  </div>
</div>

<div id="pubApp">
  <div class="topbar">
    <span class="logo"><span>Agenda</span> Pública</span>
    <div class="topbar-right">
      <button class="btn-outline btn-danger" onclick="showLogin()">&#8592; Voltar</button>
    </div>
  </div>
  <div class="main">
    <div class="pub-banner">&#128274; Visualização pública — somente leitura</div>
    <div class="stats" id="pubStats"></div>
    <div class="toolbar">
      <div class="year-nav">
        <button class="yn-btn" onclick="changePubYear(-1)">&#8249;</button>
        <span class="yn-label" id="pubYear">2026</span>
        <button class="yn-btn" onclick="changePubYear(1)">&#8250;</button>
      </div>
      <div class="filters">
        <button class="fbtn fa" id="pfb-all" onclick="setPubFilter('all')">Todos</button>
        <button class="fbtn" id="pfb-e" onclick="setPubFilter('e')">Eventos</button>
        <button class="fbtn" id="pfb-t" onclick="setPubFilter('t')">Treinamentos</button>
      </div>
    </div>
    <div id="pubList"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Novo item</h2>
    <div class="field">
      <label>Tipo</label>
      <div class="type-row">
        <button class="topt sel-e" id="to-e" onclick="selType('e')">&#128197; Evento</button>
        <button class="topt" id="to-t" onclick="selType('t')">&#127891; Treinamento</button>
      </div>
    </div>
    <div class="field"><label>Título *</label><input type="text" id="fTitle" placeholder="Nome do evento"></div>
    <div class="row2">
      <div class="field"><label>Data início *</label><input type="date" id="fDate"></div>
      <div class="field"><label>Data fim</label><input type="date" id="fDateEnd"></div>
    </div>
    <div class="field"><label>Local / Modalidade</label><input type="text" id="fLocal" placeholder="Presencial / Online"></div>
    <div class="field"><label>Descrição</label><textarea id="fDesc" placeholder="Detalhes, instrutor, carga horária..."></textarea></div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEvt()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var PASS='Cnh1357@';
var MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DH=['D','S','T','Q','Q','S','S'];
var year=new Date().getFullYear();
var pubYear=new Date().getFullYear();
var curView='cal';
var curFilter='all';
var pubFilter='all';
var curType='e';
var editId=null;
var events=[];

try{ events=JSON.parse(localStorage.getItem('agenda_v3')||'[]'); }catch(e){ events=[]; }

function persist(){ try{ localStorage.setItem('agenda_v3',JSON.stringify(events)); }catch(e){} }

function show(id){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminApp').style.display='none';
  document.getElementById('pubApp').style.display='none';
  document.getElementById(id).style.display='block';
}

function doLogin(){
  if(document.getElementById('pwdInput').value===PASS){
    document.getElementById('loginErr').style.display='none';
    document.getElementById('pwdInput').value='';
    show('adminApp');
    render();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

function doLogout(){ show('loginScreen'); }
function showLogin(){ show('loginScreen'); }
function showPub(){ show('pubApp'); pubYear=year; document.getElementById('pubYear').textContent=pubYear; renderPub(); }

function yearEvts(y,f){
  return events.filter(function(e){ return e.date.indexOf(y+'-')===0&&(f==='all'||e.type===f); }).sort(function(a,b){ return a.date>b.date?1:-1; });
}

function switchView(v){
  curView=v;
  document.getElementById('navCal').className='btn-outline'+(v==='cal'?' active':'');
  document.getElementById('navList').className='btn-outline'+(v==='list'?' active':'');
  document.getElementById('adminCal').style.display=v==='cal'?'block':'none';
  document.getElementById('adminList').style.display=v==='list'?'block':'none';
}

function changeYear(d){ year+=d; document.getElementById('adminYear').textContent=year; render(); }
function changePubYear(d){ pubYear+=d; document.getElementById('pubYear').textContent=pubYear; renderPub(); }

function setFilter(f){
  curFilter=f;
  ['all','e','t'].forEach(function(x){ document.getElementById('fb-'+x).className='fbtn'+(f===x?' f'+x:''); });
  render();
}

function setPubFilter(f){
  pubFilter=f;
  ['all','e','t'].forEach(function(x){ document.getElementById('pfb-'+x).className='fbtn'+(f===x?' f'+x:''); });
  renderPub();
}

function render(){ renderCal(); renderList(); }

function renderCal(){
  var allY=events.filter(function(e){ return e.date.indexOf(year+'-')===0; });
  var ye=yearEvts(year,curFilter);
  var today=new Date();
  var html='<div class="cal-grid">';
  for(var mi=0;mi<12;mi++){
    var mstr=String(mi+1).padStart(2,'0');
    var mEvts=ye.filter(function(e){ return e.date.split('-')[1]===mstr; });
    var allM=allY.filter(function(e){ return e.date.split('-')[1]===mstr; });
    var days=new Date(year,mi+1,0).getDate();
    var first=new Date(year,mi,1).getDay();
    var dg='<div class="dgrid">';
    for(var i=0;i<7;i++) dg+='<div class="dh">'+DH[i]+'</div>';
    for(var i=0;i<first;i++) dg+='<div></div>';
    for(var d=1;d<=days;d++){
      var ds=year+'-'+mstr+'-'+String(d).padStart(2,'0');
      var de=allM.filter(function(e){ return e.date===ds||(e.dateEnd&&ds>=e.date&&ds<=e.dateEnd); });
      var isT=today.getFullYear()===year&&today.getMonth()===mi&&today.getDate()===d;
      var hasE=de.some(function(e){ return e.type==='e'; });
      var hasT=de.some(function(e){ return e.type==='t'; });
      var cls=isT?'today':'';
      if(hasE&&hasT) cls+=' hasboth'; else if(hasE) cls+=' hase'; else if(hasT) cls+=' hast';
      var tip=de.map(function(e){ return e.title; }).join(', ').replace(/"/g,'&quot;');
      dg+='<div class="dc '+cls+'" title="'+tip+'" onclick="openModal(\''+ds+'\')">'+d+'</div>';
    }
    dg+='</div>';
    var ec=mEvts.filter(function(e){ return e.type==='e'; }).length;
    var tc=mEvts.filter(function(e){ return e.type==='t'; }).length;
    var bdg=(ec?'<span class="mbadge mbe">'+ec+' ev</span>':'')+(tc?'<span class="mbadge mbt">'+tc+' tr</span>':'');
    html+='<div class="mcal"><div class="mtitle">'+MONTHS[mi]+'</div>'+dg+(bdg?'<div class="mbadges">'+bdg+'</div>':'')+'</div>';
  }
  html+='</div>';
  document.getElementById('adminCal').innerHTML=html;
}

function renderList(){
  var ye=yearEvts(year,curFilter);
  if(!ye.length){ document.getElementById('adminList').innerHTML='<div class="empty">Nenhum evento cadastrado neste ano.<br><small>Clique em "+ Adicionar" para começar.</small></div>'; return; }
  var byM={};
  ye.forEach(function(e){ var mi=parseInt(e.date.split('-')[1])-1; if(!byM[mi]) byM[mi]=[]; byM[mi].push(e); });
  var html='';
  Object.keys(byM).sort(function(a,b){ return a-b; }).forEach(function(mi){
    html+='<div class="lsec"><div class="lmhdr">'+MONTHS[mi]+'</div>';
    byM[mi].forEach(function(e){
      var ds=fmtDate(e.date)+(e.dateEnd?' → '+fmtDate(e.dateEnd):'');
      html+='<div class="erow"><div class="ebar bar-'+e.type+'"></div><div class="ebody"><span class="etag etag-'+e.type+'">'+(e.type==='e'?'Evento':'Treinamento')+'</span><div class="ename">'+esc(e.title)+'</div><div class="emeta">📅 '+ds+(e.local?' &nbsp;·&nbsp; 📍 '+esc(e.local):'')+'</div>'+(e.desc?'<div class="edesc">'+esc(e.desc)+'</div>':'')+'</div><div class="eactions"><button class="ibtn" onclick="editEvt('+e.id+')" title="Editar">✏️</button><button class="ibtn del" onclick="delEvt('+e.id+')" title="Excluir">🗑️</button></div></div>';
    });
    html+='</div>';
  });
  document.getElementById('adminList').innerHTML=html;
}

function renderPub(){
  var allY=yearEvts(pubYear,'all');
  var ye=yearEvts(pubYear,pubFilter);
  var ec=allY.filter(function(e){ return e.type==='e'; }).length;
  var tc=allY.filter(function(e){ return e.type==='t'; }).length;
  document.getElementById('pubStats').innerHTML='<div class="scard"><div class="snum">'+allY.length+'</div><div class="slbl">total '+pubYear+'</div></div><div class="scard"><div class="snum">'+ec+'</div><div class="slbl">eventos</div></div><div class="scard"><div class="snum">'+tc+'</div><div class="slbl">treinamentos</div></div>';
  if(!ye.length){ document.getElementById('pubList').innerHTML='<div class="empty">Nenhum evento publicado para este ano.</div>'; return; }
  var byM={};
  ye.forEach(function(e){ var mi=parseInt(e.date.split('-')[1])-1; if(!byM[mi]) byM[mi]=[]; byM[mi].push(e); });
  var html='';
  Object.keys(byM).sort(function(a,b){ return a-b; }).forEach(function(mi){
    html+='<div class="lsec"><div class="lmhdr">'+MONTHS[mi]+'</div>';
    byM[mi].forEach(function(e){
      var ds=fmtDate(e.date)+(e.dateEnd?' → '+fmtDate(e.dateEnd):'');
      html+='<div class="erow"><div class="ebar bar-'+e.type+'"></div><div class="ebody"><span class="etag etag-'+e.type+'">'+(e.type==='e'?'Evento':'Treinamento')+'</span><div class="ename">'+esc(e.title)+'</div><div class="emeta">📅 '+ds+(e.local?' &nbsp;·&nbsp; 📍 '+esc(e.local):'')+'</div>'+(e.desc?'<div class="edesc">'+esc(e.desc)+'</div>':'')+'</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('pubList').innerHTML=html;
}

function openModal(date){
  editId=null; curType='e';
  document.getElementById('fTitle').value='';
  document.getElementById('fDate').value=date||'';
  document.getElementById('fDateEnd').value='';
  document.getElementById('fLocal').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('modalTitle').textContent='Novo item';
  updType();
  document.getElementById('overlay').classList.add('open');
}

function editEvt(id){
  var e=events.find(function(x){ return x.id===id; }); if(!e) return;
  editId=id; curType=e.type;
  document.getElementById('fTitle').value=e.title;
  document.getElementById('fDate').value=e.date;
  document.getElementById('fDateEnd').value=e.dateEnd||'';
  document.getElementById('fLocal').value=e.local||'';
  document.getElementById('fDesc').value=e.desc||'';
  document.getElementById('modalTitle').textContent='Editar item';
  updType();
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function selType(t){ curType=t; updType(); }
function updType(){
  document.getElementById('to-e').className='topt'+(curType==='e'?' sel-e':'');
  document.getElementById('to-t').className='topt'+(curType==='t'?' sel-t':'');
}

function saveEvt(){
  var title=document.getElementById('fTitle').value.trim();
  var date=document.getElementById('fDate').value;
  if(!title||!date){ showToast('Preencha o título e a data.'); return; }
  var obj={id:editId||Date.now(),type:curType,title:title,date:date,dateEnd:document.getElementById('fDateEnd').value||null,local:document.getElementById('fLocal').value.trim(),desc:document.getElementById('fDesc').value.trim()};
  if(editId){ var i=events.findIndex(function(e){ return e.id===editId; }); events[i]=obj; }
  else events.push(obj);
  persist(); closeModal(); render();
  showToast(editId?'Item atualizado!':'Item adicionado!');
}

function delEvt(id){
  if(!confirm('Excluir este item?')) return;
  events=events.filter(function(e){ return e.id!==id; }); persist(); render();
  showToast('Item excluído.');
}

function fmtDate(ds){ if(!ds) return ''; var p=ds.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function esc(s){ return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

var toastT;
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },2500);
}

document.getElementById('overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
</script>
</body>
</html>
